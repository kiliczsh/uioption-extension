<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <div class="p-header">
      <svg viewBox="0 0 24 24" fill="none" width="20" height="20" aria-hidden="true">
        <rect class="logo-rect" width="24" height="24" rx="6"/>
        <path d="M7 8.5h4.5M7 12h10.5M7 15.5h7.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
        <circle cx="16" cy="8.5" r="2" fill="#a3e635"/>
      </svg>
      <span class="header-title">uioption</span>
      <button type="button" class="theme-btn" id="theme-btn" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
          <circle cx="8" cy="8" r="2.5"/>
          <line x1="8" y1="1.5" x2="8" y2="3"/>
          <line x1="8" y1="13" x2="8" y2="14.5"/>
          <line x1="1.5" y1="8" x2="3" y2="8"/>
          <line x1="13" y1="8" x2="14.5" y2="8"/>
          <line x1="3.4" y1="3.4" x2="4.4" y2="4.4"/>
          <line x1="11.6" y1="11.6" x2="12.6" y2="12.6"/>
          <line x1="12.6" y1="3.4" x2="11.6" y2="4.4"/>
          <line x1="4.4" y1="11.6" x2="3.4" y2="12.6"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
          <path d="M8 1.5a6.5 6.5 0 1 0 5.69 9.637C12.362 11.607 11.19 12 10 12A5.5 5.5 0 0 1 8 1.5z"/>
        </svg>
      </button>
    </div>

    <div data-uioption-pick="Popup layout" class="contents">

      <!-- ─── Option 1: Current ─── -->
      <div data-uioption-option="Current (current)" class="contents">

        <div class="p-section">
          <div class="p-row">
            <label for="auto-inject" class="p-label">Auto-inject</label>
            <!-- biome-ignore lint/a11y/noLabelWithoutControl: wraps the checkbox to make the toggle track clickable; text lives in the sibling label -->
            <label class="toggle">
              <input type="checkbox" id="auto-inject" />
              <div class="toggle-track"></div>
            </label>
          </div>
        </div>

        <div class="p-section">
          <div class="p-row">
            <span class="p-label">UI Picker</span>
            <div class="style-segs" id="style-segs">
              <button type="button" class="style-seg active" data-style="compact" title="Compact bar">
                <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12" aria-hidden="true"><path d="M2 4.75A.75.75 0 0 1 2.75 4h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 4.75ZM2 8a.75.75 0 0 1 .75-.75h10.5a.75.75 0 0 1 0 1.5H2.75A.75.75 0 0 1 2 8Zm0 3.25a.75.75 0 0 1 .75-.75h4.5a.75.75 0 0 1 0 1.5h-4.5a.75.75 0 0 1-.75-.75Z"/></svg>
              </button>
              <button type="button" class="style-seg" data-style="features" title="Features grid">
                <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12" aria-hidden="true"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5v-3ZM9 2.5A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5v-3ZM1 10.5A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5v-3ZM9 10.5A1.5 1.5 0 0 1 10.5 9h3A1.5 1.5 0 0 1 15 10.5v3A1.5 1.5 0 0 1 13.5 15h-3A1.5 1.5 0 0 1 9 13.5v-3Z"/></svg>
              </button>
            </div>
          </div>
          <button type="button" class="btn btn-primary" id="inject-btn">Inject picker</button>
          <button type="button" class="btn btn-secondary" id="uninject-btn" style="display:none">Remove picker</button>
          <p class="p-message" id="message"></p>
          <div class="copy-row">
            <span class="copy-label">Picker prompt</span>
            <button type="button" class="copy-btn" id="copy-btn">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/>
                <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
              </svg>
              Copy
            </button>
          </div>
        </div>

        <div class="p-section">
          <div class="p-row">
            <span class="p-label">UI Inspector</span>
          </div>
          <button type="button" class="btn btn-inspector" id="inject-inspector-btn">Inject inspector</button>
          <button type="button" class="btn btn-secondary" id="uninject-inspector-btn" style="display:none">Remove inspector</button>
          <p class="p-message" id="inspector-message"></p>
        </div>

      </div><!-- /Current -->


      <!-- ─── Option 2: Refined ─── -->
      <!--
        Both tools in one section. Inspector uses a neutral outlined button
        instead of blue — keeps the lime as the only accent and makes the
        hierarchy clear: picker is primary, inspector is secondary.
      -->
      <div data-uioption-option="Refined" class="contents" hidden>

        <div class="p-section">
          <div class="p-row">
            <label for="auto-inject-b" class="p-label">Auto-inject</label>
            <!-- biome-ignore lint/a11y/noLabelWithoutControl: wraps the checkbox to make the toggle track clickable; text lives in the sibling label -->
            <label class="toggle">
              <input type="checkbox" id="auto-inject-b" />
              <div class="toggle-track"></div>
            </label>
          </div>
        </div>

        <div class="p-section">
          <span class="tool-label">UI Picker</span>
          <button type="button" class="btn btn-primary" id="inject-btn-b">Inject picker</button>
          <button type="button" class="btn btn-secondary" id="uninject-btn-b" style="display:none">Remove picker</button>
          <p class="p-message" id="message-b"></p>
          <div class="copy-row">
            <span class="copy-label">Picker prompt</span>
            <button type="button" class="copy-btn" id="copy-btn-b">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/>
                <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
              </svg>
              Copy
            </button>
          </div>

          <div class="tool-divider"></div>

          <span class="tool-label">UI Inspector</span>
          <button type="button" class="btn btn-secondary" id="inject-inspector-btn-b">Inject inspector</button>
          <button type="button" class="btn btn-secondary" id="uninject-inspector-btn-b" style="display:none">Remove inspector</button>
          <p class="p-message" id="inspector-message-b"></p>
        </div>

      </div><!-- /Refined -->


      <!-- ─── Option 3: Compact rows ─── -->
      <!--
        All tools as rows: colored dot + label on left, small action button
        on right. Very compact, toolkit feel. No full-width buttons.
      -->
      <div data-uioption-option="Compact rows" class="contents" hidden>

        <div class="p-section" style="gap: 0;">
          <div class="p-row" style="padding: 3px 0 7px;">
            <label for="auto-inject-c" class="p-label">Auto-inject</label>
            <!-- biome-ignore lint/a11y/noLabelWithoutControl: wraps the checkbox to make the toggle track clickable; text lives in the sibling label -->
            <label class="toggle">
              <input type="checkbox" id="auto-inject-c" />
              <div class="toggle-track"></div>
            </label>
          </div>

          <div class="tool-divider"></div>

          <div class="tool-row" style="padding-top: 9px;">
            <span class="tool-dot tool-dot-lime"></span>
            <span class="tool-row-label">UI Picker</span>
            <span class="p-message-inline" id="message-c"></span>
            <button type="button" class="btn-sm btn-sm-lime" id="inject-btn-c">Inject</button>
            <button type="button" class="btn-sm btn-sm-neutral" id="uninject-btn-c" style="display:none">Remove</button>
          </div>

          <div class="tool-row" style="padding-bottom: 2px;">
            <span style="width:6px;flex-shrink:0;"></span>
            <span class="copy-label" style="font-size:0.75rem;">Picker prompt</span>
            <button type="button" class="copy-btn" id="copy-btn-c" style="padding:3px 7px;font-size:0.6875rem;">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/>
                <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
              </svg>
              Copy
            </button>
          </div>

          <div class="tool-divider" style="margin: 4px 0;"></div>

          <div class="tool-row">
            <span class="tool-dot tool-dot-neutral"></span>
            <span class="tool-row-label">UI Inspector</span>
            <span class="p-message-inline" id="inspector-message-c"></span>
            <button type="button" class="btn-sm btn-sm-neutral" id="inject-inspector-btn-c">Inject</button>
            <button type="button" class="btn-sm btn-sm-neutral" id="uninject-inspector-btn-c" style="display:none">Remove</button>
          </div>
        </div>

      </div><!-- /Compact rows -->


      <!-- ─── Option 4: Cards ─── -->
      <!--
        Each tool in its own subtle surface card. Clear separation, premium
        feel. Lime button for picker, neutral for inspector. Auto-inject stays
        above as a simple row.
      -->
      <div data-uioption-option="Cards" class="contents" hidden>

        <div class="p-section">
          <div class="p-row">
            <label for="auto-inject-d" class="p-label">Auto-inject</label>
            <!-- biome-ignore lint/a11y/noLabelWithoutControl: wraps the checkbox to make the toggle track clickable; text lives in the sibling label -->
            <label class="toggle">
              <input type="checkbox" id="auto-inject-d" />
              <div class="toggle-track"></div>
            </label>
          </div>
        </div>

        <div class="p-section" style="gap: 6px;">

          <div class="tool-card">
            <div class="tool-card-header">
              <span class="tool-dot tool-dot-lime"></span>
              <span class="tool-card-name">UI Picker</span>
              <span class="p-message-inline" id="message-d"></span>
            </div>
            <button type="button" class="card-btn-lime" id="inject-btn-d">Inject picker</button>
            <button type="button" class="card-btn-neutral" id="uninject-btn-d" style="display:none">Remove picker</button>
            <div class="copy-row">
              <span class="copy-label">Picker prompt</span>
              <button type="button" class="copy-btn" id="copy-btn-d">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/>
                  <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
                </svg>
                Copy
              </button>
            </div>
          </div>

          <div class="tool-card">
            <div class="tool-card-header">
              <span class="tool-dot tool-dot-neutral"></span>
              <span class="tool-card-name">UI Inspector</span>
              <span class="p-message-inline" id="inspector-message-d"></span>
            </div>
            <button type="button" class="card-btn-neutral" id="inject-inspector-btn-d">Inject inspector</button>
            <button type="button" class="card-btn-neutral" id="uninject-inspector-btn-d" style="display:none">Remove inspector</button>
          </div>

        </div>

      </div><!-- /Cards -->

    </div><!-- /picker -->

    <script src="popup.js"></script>
  </body>
</html>
